<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Artifact Manager</title>
  <style>
    body {
      font-family: "Roboto", serif;
      background-color: ivory;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      color: #30395c;
    }
    .container {
      padding: 2rem;
      max-width: 30rem;
    }
    h1 {
      font-family: "Raleway", Arial, Helvetica, sans-serif;
      font-size: 1.7rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
    }
    button {
      color: white;
      background: #0093e9;
      border: none;
      padding: 0.7rem 1.3rem;
      border-radius: 0.8rem;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 1rem;
    }
    button:hover {
      background: #80d0c7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
